<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playbook Operacional - Início</title>
    <style>
        :root {
            --bg-pag-absoluto: #0a0a0c;   
            --bg-azul-dark-vão: #16161f;  
            --bg-card-interno: #0f0f14;   
            --rosa-vivo: #ff007f;          
            --rosa-hover: #d8006b;         
            --texto-principal: #f4f4f6;    
            --borda: #262633;              
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-pag-absoluto);
            color: var(--texto-principal);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .welcome-container {
            width: 100%;
            max-width: 550px; 
            background-color: var(--bg-azul-dark-vão);
            border: 1px solid var(--borda);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            animation: cardEntrance 0.5s ease-out;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-header {
            border-bottom: 2px solid var(--rosa-vivo);
            padding: 2rem 1.5rem 1.2rem 1.5rem;
            text-align: center;
            background: linear-gradient(180deg, rgba(22,22,31,1) 0%, rgba(15,15,20,0.6) 100%);
        }

        .welcome-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--texto-principal);
            text-transform: uppercase;
        }

        .welcome-header h1 span {
            color: var(--rosa-vivo);
        }

        .welcome-body {
            padding: 2rem 1.5rem;
            background-color: var(--bg-card-interno);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .welcome-texto {
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--texto-principal);
            background: linear-gradient(90deg, #1f121e 0%, #13131a 100%);
            padding: 1.2rem;
            border-left: 4px solid var(--rosa-vivo); 
            border-radius: 0 4px 4px 0;
            opacity: 0.9;
            margin-bottom: 0.5rem;
        }

        .welcome-footer {
            display: flex;
            flex-direction: column; /* Botões um embaixo do outro */
            gap: 1rem; /* Espaço entre botões */
            padding-bottom: 1rem;
        }

        .btn-acessar-playbook {
            width: 100%;
            background-color: var(--rosa-vivo);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 1rem 1.5rem;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(255, 0, 127, 0.1);
            text-align: center;
        }

        .btn-acessar-playbook:hover {
            background-color: var(--rosa-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 127, 0.3);
        }

        /* Cor opcional para diferenciar o "Plano de Trade" se quiser */
        .btn-trade {
            background-color: transparent;
            border: 1px solid var(--rosa-vivo);
            color: var(--rosa-vivo);
        }
        
        .btn-trade:hover {
            background-color: rgba(255, 0, 127, 0.05);
        }
    </style>
</head>
<body>

    <div class="welcome-container">
        
        <div class="welcome-header">
            <h1>PLAYBOOK // <span>ESTUDO INTERATIVO</span></h1>
        </div>

        <div class="welcome-body">
            <p class="welcome-texto">
                Aqui vamos formentar e fixar nosso conhecimento. Entenda cada tópico a fundo antes de seguir para as aulas. O tempo refine nosso conhecimento matemático que move a análise. Obtenha resultados extraordinários no futuro!
            </p>

            <div class="welcome-footer">
                <button id="btn-trade" class="btn-acessar-playbook btn-trade" type="button">
                    Iniciar Playbook Plano de trade
                </button>

                <button id="btn-p1" class="btn-acessar-playbook" type="button">
                    Iniciar Playbook Operacional // Parte 1
                </button>

                <button id="btn-p2" class="btn-acessar-playbook" type="button">
                    Iniciar Playbook Operacional // Parte 2
                </button>
            </div>
        </div>

    </div>

    <script>
        // Configuração dos caminhos (Mude os nomes dos arquivos abaixo se necessário)
        const caminhos = {
            trade: 'plano_de_trade.html',
            parte1: 'playbook.html',
            parte2: 'playbook_parte2.html'
        };

        document.getElementById('btn-trade').addEventListener('click', function() {
            window.open(caminhos.trade, '_blank');
        });

        document.getElementById('btn-p1').addEventListener('click', function() {
            window.open(caminhos.parte1, '_blank');
        });

        document.getElementById('btn-p2').addEventListener('click', function() {
            window.open(caminhos.parte2, '_blank');
        });
    </script>

</body>
</html>
